on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  git-leaks-scan:
    runs-on: ubuntu-latest
    steps:
      -name : Checkout Code
      -uses: actions/checkout@v3

      -uses: gitleaks/gitleaks-action@v2
      -env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}