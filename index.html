<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bonjour Docker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --accent: #e8ff47;
      --text: #f0ede6;
      --muted: #555;
      --border: #222;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 3rem 3.5rem;
      max-width: 560px;
      width: 90%;
      position: relative;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px;
      height: 2px;
      background: var(--accent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tag {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tag::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
      margin-bottom: 0.25rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 2.5rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      margin-bottom: 2.5rem;
    }

    .info-cell {
      background: var(--surface);
      padding: 1rem;
    }

    .info-cell .label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .info-cell .value {
      font-size: 0.85rem;
      color: var(--text);
    }

    .info-cell .value.highlight {
      color: var(--accent);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      padding: 0.75rem 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    .footer {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.65rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    #time { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">Conteneur actif</div>
    <h1>Bonjour,<br><em>Test v2.</em></h1>
    <p class="subtitle">Servi par nginx · Prêt à l'emploi</p>

    <div class="info-grid">
      <div class="info-cell">
        <div class="label">Serveur</div>
        <div class="value highlight">nginx:alpine</div>
      </div>
      <div class="info-cell">
        <div class="label">Port exposé</div>
        <div class="value">8080</div>
      </div>
      <div class="info-cell">
        <div class="label">Environnement</div>
        <div class="value">Docker</div>
      </div>
      <div class="info-cell">
        <div class="label">Statut</div>
        <div class="value highlight">En ligne ✓</div>
      </div>
    </div>

    <button class="btn" onclick="this.textContent='✓ OK !'">
      ▶ Tester la page
    </button>

    <div class="footer">
      <span>mini-docker-app · v1.0</span>
      <span id="time"></span>
    </div>
  </div>

  <script>
    const t = document.getElementById('time');
    const fmt = () => new Date().toLocaleTimeString('fr-FR');
    t.textContent = fmt();
    setInterval(() => t.textContent = fmt(), 1000);
  </script>
</body>
</html>
